name: Build & release Windows binary

# Runs when you push a tag like ``v0.1.0`` (any tag starting with v).
# It builds the standalone ``petrilya.exe`` and attaches it to a GitHub
# Release with the same tag name. The download link on petrilya.com
# (which points to /releases/latest/download/petrilya-windows.exe) then
# automatically serves the new binary.

on:
  push:
    tags:
      - 'v*'
  # Also allow a manual run from the Actions tab so we can produce a
  # build without bumping the tag (it just won't auto-attach to a
  # release).
  workflow_dispatch: {}

permissions:
  contents: write  # needed to create / upload to a release

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          # PyTorch CPU build — much smaller than the CUDA one. Users
          # who want GPU can install the package via pip themselves.
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[dev]"
          pip install pyinstaller>=6.0 cairosvg pillow

      - name: Build the executable
        shell: pwsh
        run: python scripts/build_windows.py

      - name: Verify build artefact
        shell: pwsh
        run: |
          $exe = "dist/petrilya.exe"
          if (-not (Test-Path $exe)) { throw "petrilya.exe not produced" }
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "petrilya.exe built: $([math]::Round($size, 1)) MB"
          # Rename to a friendlier file name for users
          Copy-Item $exe "dist/petrilya-windows.exe"

      - name: Upload as workflow artefact (manual builds)
        uses: actions/upload-artifact@v4
        with:
          name: petrilya-windows-exe
          path: dist/petrilya-windows.exe
          retention-days: 14

      - name: Create / update GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/petrilya-windows.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
